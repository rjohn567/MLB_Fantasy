name: Nightly Cache Rebuild
on:
  schedule:
    - cron: '0 8 * * *' # 4:00 AM ET (8:00 AM UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas statsapi gspread google-auth gspread-formatting
      - name: Rebuild Cache and Update
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python main.py --rebuild-cache
      - name: Save Caches
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add player_teams_cache.json hr_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Nightly Cache Rebuild [skip ci]" && git push)